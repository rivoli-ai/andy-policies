//
// gRPC contract for the catalog audit chain (P6.8,
// rivoli-ai/andy-policies#50). Sits alongside policies.proto,
// lifecycle.proto, bindings.proto, scopes.proto, overrides.proto
// in the same `andy_policies` package + `Andy.Policies.Api.Protos`
// C# namespace so existing consumers can pull in audit RPCs
// without a second stub generation.
//
// Wire format conventions match the sibling protos:
//   - snake_case proto fields generate to PascalCase in C#.
//   - GUIDs travel as strings (parsed server-side).
//   - DateTimeOffset travels as ISO 8601 strings.
//   - hashes travel as lowercase hex strings (matches the
//     wire-format from REST/MCP — no binary encoding agreement
//     needed across surfaces).
//   - field_diff_json travels as a JSON-string (the bundle
//     verifier parses it back to a JsonElement). Picking a
//     string over `google.protobuf.Struct` keeps the proto
//     contract stable when the JSON Patch shape evolves.

syntax = "proto3";

option csharp_namespace = "Andy.Policies.Api.Protos";

package andy_policies;

service AuditService {
  // List audit events with optional filters; cursor is opaque
  // base64-JSON from a previous page's NextCursor. PageSize
  // clamped to [1, 500] server-side.
  rpc ListAudit (ListAuditRequest) returns (ListAuditResponse);

  // Single-row read by id; returns NOT_FOUND when missing.
  rpc GetAudit (GetAuditRequest) returns (AuditEventMessage);

  // Verify the chain in [from_seq, to_seq] (inclusive). Divergence
  // is a queryable state — Valid=false with FirstDivergenceSeq
  // pinpoints the tampered row, never raised as an error.
  rpc VerifyAudit (VerifyAuditRequest) returns (VerifyAuditResponse);

  // Export the chain as NDJSON. Server-streaming so 1M-row
  // exports don't OOM the server or the client. Each chunk
  // carries a contiguous slice of the UTF-8 NDJSON byte
  // sequence; concatenating chunks yields the full bundle.
  rpc ExportAudit (ExportAuditRequest) returns (stream AuditExportChunk);
}

// -- shared messages ------------------------------------------------------

message AuditEventMessage {
  string id = 1;
  int64 seq = 2;
  string prev_hash_hex = 3;
  string hash_hex = 4;
  string timestamp = 5;             // ISO 8601
  string actor_subject_id = 6;
  repeated string actor_roles = 7;
  string action = 8;
  string entity_type = 9;
  string entity_id = 10;
  string field_diff_json = 11;      // RFC 6902 JSON Patch as a JSON string
  string rationale = 12;            // empty when null on the server side
}

// -- request / response messages -----------------------------------------

message ListAuditRequest {
  string actor = 1;                 // empty = no filter
  string entity_type = 2;
  string entity_id = 3;
  string action = 4;
  string from = 5;                  // ISO 8601; empty = unset
  string to = 6;                    // ISO 8601; empty = unset
  string cursor = 7;                // empty = first page
  int32 page_size = 8;              // 0 = use server default (50)
}

message ListAuditResponse {
  repeated AuditEventMessage items = 1;
  string next_cursor = 2;           // empty = last page
  int32 page_size = 3;
}

message GetAuditRequest {
  string id = 1;
}

message VerifyAuditRequest {
  int64 from_seq = 1;               // 0 = unset (defaults to 1 server-side)
  int64 to_seq = 2;                 // 0 = unset (defaults to MAX(seq))
}

message VerifyAuditResponse {
  bool valid = 1;
  int64 first_divergence_seq = 2;   // 0 when valid is true
  int64 inspected_count = 3;
  int64 last_seq = 4;
}

message ExportAuditRequest {
  int64 from_seq = 1;
  int64 to_seq = 2;
}

message AuditExportChunk {
  bytes ndjson = 1;
}

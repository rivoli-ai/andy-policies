openapi: 3.0.1
info:
  title: Andy Policies API
  description: 'Governance policy catalog — structured, versioned policy documents with lifecycle and audit trail, consumed by Conductor for story admission, verification, and compliance reporting (content only; enforcement lives in consumers).'
  contact:
    name: Rivoli AI
    url: https://github.com/rivoli-ai/andy-policies
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: v1
paths:
  /health:
    get:
      tags:
        - 'Andy.Policies.Api, Version=1.0.0.0, Culture=neutral, PublicKeyToken=null'
      operationId: health
      responses:
        '200':
          description: OK
  /api/bindings:
    post:
      tags:
        - Bindings
      summary: "Create a new binding. Body: Andy.Policies.Application.Dtos.CreateBindingRequest.\r\nReturns 201 with a `Location` header pointing at the new\r\nresource. Refuses bindings to Retired versions with 409 Conflict;\r\nmissing target version returns 404; oversized/empty\r\n`targetRef` returns 400."
      operationId: Bindings_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBindingRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateBindingRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateBindingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    get:
      tags:
        - Bindings
      summary: "List active bindings for a target — exact-equality match on\r\n`(targetType, targetRef)`, no prefix or case-folding (P3.2\r\nservice contract). Tombstoned bindings are excluded; a separate\r\nversion-rooted endpoint is available for inspection of deleted\r\nrows."
      operationId: Bindings_Query
      parameters:
        - name: targetType
          in: query
          schema:
            $ref: '#/components/schemas/BindingTargetType'
        - name: targetRef
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BindingDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/bindings/{id}':
    get:
      tags:
        - Bindings
      summary: "Get a single binding by id. Returns 404 if the binding does not\r\nexist; tombstoned bindings are still visible here so audit\r\ninvestigators can inspect their `DeletedAt` stamp."
      operationId: Bindings_Get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      tags:
        - Bindings
      summary: "Soft-delete a binding. Returns 204 on success; calling delete on an\r\nalready-tombstoned binding returns 404 (the row is treated as\r\nnot-found). Accepts optional `?rationale=...` propagated to\r\nthe audit record."
      operationId: Bindings_Delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rationale
          in: query
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/bindings/resolve:
    get:
      tags:
        - Bindings
      summary: "Resolve bindings for a target (P3.4, story\r\nrivoli-ai/andy-policies#22). Distinct from M:Andy.Policies.Api.Controllers.BindingsController.Query(Andy.Policies.Domain.Enums.BindingTargetType,System.String,System.Threading.CancellationToken):\r\njoins each row to its `Policy` and `PolicyVersion` so\r\ncallers get policy name, version state, enforcement, severity, and\r\nscopes without a second round-trip; filters out bindings whose\r\ntarget version is Retired; dedups same-target/same-version pairs\r\npreferring `Mandatory` over `Recommended`; orders the\r\nresult deterministically (policy name ASC, then version number\r\nDESC). Exact-match only — no hierarchy walk; that's P4. An\r\nunknown target returns 200 with `count = 0`, never 404."
      operationId: Bindings_Resolve
      parameters:
        - name: targetType
          in: query
          schema:
            $ref: '#/components/schemas/BindingTargetType'
        - name: targetRef
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveBindingsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/Help/topics:
    get:
      tags:
        - Help
      summary: 'List all help topics (slug, title, order, tags).'
      operationId: Help_ListTopics
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HelpTopicSummary'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HelpTopicSummary'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HelpTopicSummary'
  '/api/Help/topics/{slug}':
    get:
      tags:
        - Help
      summary: "Get a single help topic by slug (filename without extension).\r\nReturns title, markdown body, and metadata."
      operationId: Help_GetTopic
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/HelpTopic'
            application/json:
              schema:
                $ref: '#/components/schemas/HelpTopic'
            text/json:
              schema:
                $ref: '#/components/schemas/HelpTopic'
  /api/Help/search:
    get:
      tags:
        - Help
      summary: 'Search help topics by keyword (searches title, tags, and body).'
      operationId: Help_Search
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HelpTopicSummary'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HelpTopicSummary'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HelpTopicSummary'
  /api/Items:
    get:
      tags:
        - Items
      operationId: Items_GetAll
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemDto'
    post:
      tags:
        - Items
      operationId: Items_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ItemDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
  '/api/Items/{id}':
    get:
      tags:
        - Items
      operationId: Items_GetById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ItemDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
    put:
      tags:
        - Items
      operationId: Items_Update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ItemDto'
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
            text/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
    delete:
      tags:
        - Items
      operationId: Items_Delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /api/overrides:
    post:
      tags:
        - Overrides
      summary: "Propose a new override. Inserts in `Proposed` state; the\r\napprover (a different subject) drives the next transition via\r\n`POST /api/overrides/{id}/approve`."
      operationId: Overrides_Propose
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposeOverrideRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/ProposeOverrideRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ProposeOverrideRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-error-codes:
        - override.disabled
        - override.self_approval_forbidden
        - rbac.denied
        - validation_failed
        - not_found
        - invalid_state
    get:
      tags:
        - Overrides
      summary: "List overrides matching the optional filter. Returns rows in\r\nany state; use `state=Approved` for the live set or\r\n`GET /api/overrides/active` for the\r\nscope-narrowed-and-non-expired projection."
      operationId: Overrides_List
      parameters:
        - name: state
          in: query
          schema:
            $ref: '#/components/schemas/OverrideState'
        - name: scopeKind
          in: query
          schema:
            $ref: '#/components/schemas/OverrideScopeKind'
        - name: scopeRef
          in: query
          schema:
            type: string
        - name: policyVersionId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OverrideDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-error-codes:
        - override.disabled
        - override.self_approval_forbidden
        - rbac.denied
        - validation_failed
        - not_found
        - invalid_state
  '/api/overrides/{id}/approve':
    post:
      tags:
        - Overrides
      summary: "Approve a `Proposed` override. Returns 403 with errorCode\r\n`override.self_approval_forbidden` when the approver is\r\nalso the proposer; 409 if the row is already past\r\n`Proposed`."
      operationId: Overrides_Approve
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-error-codes:
        - override.disabled
        - override.self_approval_forbidden
        - rbac.denied
        - validation_failed
        - not_found
        - invalid_state
  '/api/overrides/{id}/revoke':
    post:
      tags:
        - Overrides
      summary: "Revoke a `Proposed` or `Approved` override. Requires\r\na non-empty `RevocationReason`; the reaper-driven\r\n`Expired` path goes through P5.3 instead."
      operationId: Overrides_Revoke
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeOverrideRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/RevokeOverrideRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/RevokeOverrideRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-error-codes:
        - override.disabled
        - override.self_approval_forbidden
        - rbac.denied
        - validation_failed
        - not_found
        - invalid_state
  '/api/overrides/{id}':
    get:
      tags:
        - Overrides
      summary: "Fetch a single override by id. Returns 404 if the row does not\r\nexist; visibility is not state-gated (an Expired or Revoked\r\nrow is still readable for audit)."
      operationId: Overrides_Get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-error-codes:
        - override.disabled
        - override.self_approval_forbidden
        - rbac.denied
        - validation_failed
        - not_found
        - invalid_state
  /api/overrides/active:
    get:
      tags:
        - Overrides
      summary: "Currently-effective overrides for the given (scopeKind, scopeRef)\r\npair. Returns only rows where `State == Approved` AND\r\n`ExpiresAt > now` — expired rows are excluded even if\r\nthe reaper has not yet ticked. Consumed by P4.3 chain\r\nresolution and by Conductor at admission time."
      operationId: Overrides_Active
      parameters:
        - name: scopeKind
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/OverrideScopeKind'
        - name: scopeRef
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OverrideDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
      x-error-codes:
        - override.disabled
        - override.self_approval_forbidden
        - rbac.denied
        - validation_failed
        - not_found
        - invalid_state
  /api/Policies:
    get:
      tags:
        - Policies
      operationId: Policies_List
      parameters:
        - name: namePrefix
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
        - name: enforcement
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            format: int32
        - name: take
          in: query
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyDto'
    post:
      tags:
        - Policies
      operationId: Policies_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            text/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
  '/api/Policies/{id}':
    get:
      tags:
        - Policies
      operationId: Policies_Get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PolicyDto'
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDto'
            text/json:
              schema:
                $ref: '#/components/schemas/PolicyDto'
  '/api/Policies/by-name/{name}':
    get:
      tags:
        - Policies
      operationId: Policies_GetByName
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PolicyDto'
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDto'
            text/json:
              schema:
                $ref: '#/components/schemas/PolicyDto'
  '/api/Policies/{id}/versions':
    get:
      tags:
        - Policies
      operationId: Policies_ListVersions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyVersionDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyVersionDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyVersionDto'
  '/api/Policies/{id}/versions/active':
    get:
      tags:
        - Policies
      summary: "Resolves the active version per ADR 0001 (highest `Version` with\r\n`State != Draft` in P1; `State == Active` after P2 lands).\r\nRoute literal \"active\" sits before `{versionId:guid}` in match precedence,\r\nand the GUID constraint makes the two routes unambiguous regardless."
      operationId: Policies_GetActiveVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            text/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
  '/api/Policies/{id}/versions/{versionId}':
    get:
      tags:
        - Policies
      operationId: Policies_GetVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            text/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
    put:
      tags:
        - Policies
      operationId: Policies_UpdateDraft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyVersionRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyVersionRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyVersionRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
            text/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
  '/api/Policies/{id}/versions/{sourceVersionId}/bump':

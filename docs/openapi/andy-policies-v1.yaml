          text/json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/policies/{id}/versions/{versionId}/winding-down':
    post:
      tags:
        - PolicyVersionsLifecycle
      summary: "Mark an Active version as winding down. Reads against the previous\r\nActive continue to resolve until the version is retired."
      operationId: PolicyVersionsLifecycle_WindDown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/policies/{id}/versions/{versionId}/retire':
    post:
      tags:
        - PolicyVersionsLifecycle
      summary: "Tombstone a version. Stamps `RetiredAt`; subsequent transitions are\r\nrejected by the matrix."
      operationId: PolicyVersionsLifecycle_Retire
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/LifecycleTransitionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyVersionDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/scopes:
    get:
      tags:
        - Scopes
      summary: "List scope nodes. Optional `?type=` filter narrows to a\r\nsingle ScopeType (Org/Tenant/Team/Repo/Template/Run); without\r\nthe filter the entire catalogue is returned ordered by\r\n(Depth, Ref)."
      operationId: Scopes_List
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ScopeType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScopeNodeDto'
    post:
      tags:
        - Scopes
      summary: "Create a new scope node. Andy.Policies.Application.Dtos.CreateScopeNodeRequest.ParentId\r\nis null for a root Andy.Policies.Domain.Enums.ScopeType.Org node and\r\nrequired otherwise. The service enforces the canonical\r\nOrg→Tenant→Team→Repo→Template→Run ladder; mismatched type\r\nreturns 400."
      operationId: Scopes_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScopeNodeRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateScopeNodeRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateScopeNodeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeNodeDto'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/scopes/tree:
    get:
      tags:
        - Scopes
      summary: "Return the full forest as nested Andy.Policies.Application.Dtos.ScopeTreeDtos.\r\nOne entry per root node; an empty catalogue returns an empty\r\nlist. Order is (Ref ASC) at every level for deterministic\r\nsnapshotting."
      operationId: Scopes_Tree
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScopeTreeDto'
  '/api/scopes/{id}':
    get:
      tags:
        - Scopes
      summary: Get a single scope node by id. Returns 404 if not found.
      operationId: Scopes_Get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeNodeDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      tags:
        - Scopes
      summary: "Delete a leaf scope node. Refuses with 409 if the node still\r\nhas children; consumers must walk the subtree and delete\r\nleaves first."
      operationId: Scopes_Delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/scopes/{id}/effective-policies':
    get:
      tags:
        - Scopes
      summary: "Resolve the effective policy set for a scope node using the\r\nstricter-tightens-only fold (P4.3). Returns 404 if the node\r\ndoesn't exist."
      operationId: Scopes_Effective
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectivePolicySetDto'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    BindStrength:
      enum:
        - Mandatory
        - Recommended
      type: string
    BindingDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyVersionId:
          type: string
          format: uuid
        targetType:
          $ref: '#/components/schemas/BindingTargetType'
        targetRef:
          type: string
          nullable: true
        bindStrength:
          $ref: '#/components/schemas/BindStrength'
        createdAt:
          type: string
          format: date-time
        createdBySubjectId:
          type: string
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        deletedBySubjectId:
          type: string
          nullable: true
      additionalProperties: false
      description: "Wire-format projection of a `Binding` (P3.2, story\r\nrivoli-ai/andy-policies#20). Surface controllers (REST, MCP, gRPC, CLI)\r\nemit this shape directly so wire behavior stays uniform.\r\nAndy.Policies.Application.Dtos.BindingDto.DeletedAt is non-null when the binding has been\r\nsoft-deleted; service-layer reads filter tombstoned rows by default."
    BindingTargetType:
      enum:
        - Template
        - Repo
        - ScopeNode
        - Tenant
        - Org
      type: string
    CreateBindingRequest:
      type: object
      properties:
        policyVersionId:
          type: string
          format: uuid
        targetType:
          $ref: '#/components/schemas/BindingTargetType'
        targetRef:
          type: string
          nullable: true
        bindStrength:
          $ref: '#/components/schemas/BindStrength'
      additionalProperties: false
      description: "Request payload for `IBindingService.CreateAsync` (P3.2, story\r\nrivoli-ai/andy-policies#20). The target version must exist and not be in\r\n`LifecycleState.Retired`; the service throws\r\n`BindingRetiredVersionException` on a retired target."
    CreateItemRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      additionalProperties: false
    CreatePolicyRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        enforcement:
          enum:
            - MUST
            - SHOULD
            - MAY
          type: string
          nullable: true
        severity:
          enum:
            - info
            - moderate
            - critical
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: string
          nullable: true
        rulesJson:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request payload for `IPolicyService.CreateDraftAsync`. Creates both the\r\nstable `Policy` row and its first `PolicyVersion` (version 1, Draft).\r\nEnum fields accept any casing on input (parsed case-insensitively by the service)."
    CreateScopeNodeRequest:
      type: object
      properties:
        parentId:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: '#/components/schemas/ScopeType'
        ref:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request payload for `IScopeService.CreateAsync` (P4.2, story\r\nrivoli-ai/andy-policies#29). Andy.Policies.Application.Dtos.CreateScopeNodeRequest.ParentId is null for a\r\nroot Andy.Policies.Domain.Enums.ScopeType.Org node; non-null for any other type.\r\nThe service enforces the canonical Org→Tenant→Team→Repo→Template→Run\r\nladder."
    EffectivePolicyDto:
      type: object
      properties:
        policyId:
          type: string
          format: uuid
        policyVersionId:
          type: string
          format: uuid
        policyKey:
          type: string
          nullable: true
        version:
          type: integer
          format: int32
        bindStrength:
          $ref: '#/components/schemas/BindStrength'
        sourceBindingId:
          type: string
          format: uuid
        sourceScopeNodeId:
          type: string
          format: uuid
          nullable: true
        sourceScopeType:
          $ref: '#/components/schemas/ScopeType'
        sourceDepth:
          type: integer
          format: int32
      additionalProperties: false
      description: "One entry in an effective-policy set (P4.3, story\r\nrivoli-ai/andy-policies#30). The result of stricter-tightens-only\r\nresolution: each Andy.Policies.Application.Dtos.EffectivePolicyDto.PolicyId appears at most once,\r\ncarrying the strictest Andy.Policies.Application.Dtos.EffectivePolicyDto.BindStrength seen anywhere in\r\nthe scope chain plus a pointer back to the binding (and the scope\r\nnode that bound it) that won the resolution."
    EffectivePolicySetDto:
      type: object
      properties:
        scopeNodeId:
          type: string
          format: uuid
          nullable: true
        policies:
          type: array
          items:
            $ref: '#/components/schemas/EffectivePolicyDto'
          nullable: true
      additionalProperties: false
      description: "Envelope for `IBindingResolutionService` results (P4.3, story\r\nrivoli-ai/andy-policies#30). Andy.Policies.Application.Dtos.EffectivePolicySetDto.ScopeNodeId is null when\r\nthe resolver was called with a target that does not map to a known\r\n`ScopeNode` — the service then degrades to P3 exact-match\r\nsemantics rather than returning 404."
    HelpTopic:
      type: object
      properties:
        slug:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        order:
          type: integer
          format: int32
        tags:
          type: array
          items:
            type: string
          nullable: true
        markdown:
          type: string
          nullable: true
      additionalProperties: false
    HelpTopicSummary:
      type: object
      properties:
        slug:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        order:
          type: integer
          format: int32
        tags:
          type: array
          items:
            type: string
          nullable: true
      additionalProperties: false
    ItemDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
    LifecycleTransitionRequest:
      type: object
      properties:
        rationale:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request payload for the lifecycle transition endpoints (P2.3, story\r\nrivoli-ai/andy-policies#13): publish, winding-down, retire. The single\r\n`rationale` field is forwarded to `ILifecycleTransitionService`\r\nwhere `IRationalePolicy` validates it against the\r\n`andy.policies.rationaleRequired` setting (P2.4 wires the dynamic\r\ngate; P2.3 ships with the require-non-empty default)."
    OverrideDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyVersionId:
          type: string
          format: uuid
        scopeKind:
          $ref: '#/components/schemas/OverrideScopeKind'
        scopeRef:
          type: string
          nullable: true
        effect:
          $ref: '#/components/schemas/OverrideEffect'
        replacementPolicyVersionId:
          type: string
          format: uuid
          nullable: true
        proposerSubjectId:
          type: string
          nullable: true
        approverSubjectId:
          type: string
          nullable: true
        state:
          $ref: '#/components/schemas/OverrideState'
        proposedAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
        rationale:
          type: string
          nullable: true
        revocationReason:
          type: string
          nullable: true
      additionalProperties: false
      description: "Wire-format projection of an `Override` (P5.2, story\r\nrivoli-ai/andy-policies#52). Surface controllers (REST P5.5,\r\nMCP/gRPC/CLI in P5.6 / P5.7) emit this shape directly so wire\r\nbehaviour stays uniform across surfaces."
    OverrideEffect:
      enum:
        - Exempt
        - Replace
      type: string
    OverrideScopeKind:
      enum:
        - Principal
        - Cohort
      type: string
    OverrideState:
      enum:
        - Proposed
        - Approved
        - Revoked
        - Expired
      type: string
    PolicyDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBySubjectId:
          type: string
          nullable: true
        versionCount:
          type: integer
          format: int32
        activeVersionId:
          type: string
          format: uuid
          nullable: true
      additionalProperties: false
      description: "Stable identity of a policy plus summary metadata about its version history.\r\nAndy.Policies.Application.Dtos.PolicyDto.ActiveVersionId resolves per P1 rule \"highest `Version` with\r\n`State != Draft`\"; P2 tightens to `State == Active`. Null while every\r\nversion is still a Draft."
    PolicyVersionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policyId:
          type: string
          format: uuid
        version:
          type: integer
          format: int32
        state:
          enum:
            - Draft
            - Active
            - WindingDown
            - Retired
          type: string
          nullable: true
        enforcement:
          enum:
            - MUST
            - SHOULD
            - MAY
          type: string
          nullable: true
        severity:
          enum:
            - info
            - moderate
            - critical
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: string
          nullable: true
        summary:
          type: string
          nullable: true
        rulesJson:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBySubjectId:
          type: string
          nullable: true
        proposerSubjectId:
          type: string
          nullable: true
      additionalProperties: false
      description: "Wire-format projection of a `PolicyVersion`. Enum-shaped fields are\r\nserialised in the casing required by ADR 0001 §6:\r\n<list type=\"bullet\"><item><term>Enforcement</term><description>uppercase RFC 2119 tokens (`MUST` / `SHOULD` / `MAY`).</description></item><item><term>Severity</term><description>lowercase (`info` / `moderate` / `critical`).</description></item><item><term>State</term><description>PascalCase (`Draft` / `Active` / `WindingDown` / `Retired`) — matches DB storage and consumer-visible lifecycle labels.</description></item></list>\r\nService layer performs the casing conversion; controllers pass the DTO through unchanged."
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: { }
    ProposeOverrideRequest:
      type: object
      properties:
        policyVersionId:
          type: string
          format: uuid
        scopeKind:
          $ref: '#/components/schemas/OverrideScopeKind'
        scopeRef:
          type: string
          nullable: true
        effect:
          $ref: '#/components/schemas/OverrideEffect'
        replacementPolicyVersionId:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: string
          format: date-time
        rationale:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request payload for `IOverrideService.ProposeAsync` (P5.2,\r\nstory rivoli-ai/andy-policies#52). The service validates that\r\nAndy.Policies.Application.Dtos.ProposeOverrideRequest.Effect matches the presence of\r\nAndy.Policies.Application.Dtos.ProposeOverrideRequest.ReplacementPolicyVersionId: `Replace` requires\r\nnon-null, `Exempt` requires null. Both\r\nAndy.Policies.Application.Dtos.ProposeOverrideRequest.PolicyVersionId and (if present)\r\nAndy.Policies.Application.Dtos.ProposeOverrideRequest.ReplacementPolicyVersionId must reference an\r\nexisting `PolicyVersion`."
    ResolveBindingsResponse:
      type: object
      properties:
        targetType:
          $ref: '#/components/schemas/BindingTargetType'
        targetRef:
          type: string
          nullable: true
        bindings:
          type: array
          items:
            $ref: '#/components/schemas/ResolvedBindingDto'
          nullable: true
        count:
          type: integer
          format: int32
      additionalProperties: false
      description: "Response envelope for `GET /api/bindings/resolve` (P3.4, story\r\nrivoli-ai/andy-policies#22). Carries the requested target so callers\r\ncaching the response can key on `(TargetType, TargetRef)`\r\nwithout re-parsing their own input. Andy.Policies.Application.Dtos.ResolveBindingsResponse.Count mirrors\r\n`Bindings.Count` for paginating callers that read the count\r\nheader field before the array."
    ResolvedBindingDto:
      type: object
      properties:
        bindingId:
          type: string
          format: uuid
        policyId:
          type: string
          format: uuid
        policyName:
          type: string
          nullable: true
        policyVersionId:
          type: string
          format: uuid
        versionNumber:
          type: integer
          format: int32
        versionState:
          type: string
          nullable: true
        enforcement:
          enum:
            - MUST
            - SHOULD
            - MAY
          type: string
          nullable: true
        severity:
          enum:
            - info
            - moderate
            - critical
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: string
          nullable: true
        bindStrength:
          $ref: '#/components/schemas/BindStrength'
      additionalProperties: false
      description: "A consumer-ready binding projection (P3.4, story\r\nrivoli-ai/andy-policies#22). Joins the live `Binding` row to its\r\ntarget `PolicyVersion` and stable `Policy` identity so a\r\ncaller (Conductor's ActionBus, andy-tasks per-task gates) gets enough\r\ncontext to decide what to do without a second round-trip. Wire-format\r\ncasing follows ADR 0001 §6: `Enforcement` uppercase RFC 2119\r\ntokens, `Severity` lowercase, `VersionState` PascalCase."
    RevokeOverrideRequest:
      type: object
      properties:
        revocationReason:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request payload for `IOverrideService.RevokeAsync` (P5.2).\r\nThe reason is required and persisted to\r\n`Override.RevocationReason`; reaper-driven expiry\r\n(`Expired`) leaves the column null."
    ScopeNodeDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: '#/components/schemas/ScopeType'
        ref:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        materializedPath:
          type: string
          nullable: true
        depth:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
      description: "Wire-format projection of a `ScopeNode` (P4.2, story\r\nrivoli-ai/andy-policies#29). Surface controllers (REST P4.5, MCP /\r\ngRPC / CLI in P4.6) emit this shape directly so wire behaviour stays\r\nuniform across surfaces."
    ScopeTreeDto:
      type: object
      properties:
        node:
          $ref: '#/components/schemas/ScopeNodeDto'
        children:
          type: array
          items:
            $ref: '#/components/schemas/ScopeTreeDto'
          nullable: true
      additionalProperties: false
      description: "Recursive tree projection: a `ScopeNode` plus its full subtree\r\n(P4.2, story rivoli-ai/andy-policies#29). Returned by\r\n`IScopeService.GetTreeAsync` and surfaced unchanged by the\r\nREST/MCP/gRPC tree endpoints in P4.5 / P4.6."
    ScopeType:
      enum:
        - Org
        - Tenant
        - Team
        - Repo
        - Template
        - Run
      type: string
    UpdatePolicyVersionRequest:
      type: object
      properties:
        summary:
          type: string
          nullable: true
        enforcement:
          enum:
            - MUST
            - SHOULD
            - MAY
          type: string
          nullable: true
        severity:
          enum:
            - info
            - moderate
            - critical
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: string
          nullable: true
        rulesJson:
          type: string
          nullable: true
      additionalProperties: false
      description: "Request payload for `IPolicyService.UpdateDraftAsync`. Mutates the content\r\nof an existing Draft version. The `Policy.Name` slug is never updated via\r\nthis path — that would require a separate endpoint (deliberately deferred)."
  securitySchemes:
    Bearer:
      type: http
      description: JWT Authorization header using the Bearer scheme.
      scheme: bearer
      bearerFormat: JWT
security:
  - Bearer: [ ]
tags:
  - name: Bindings
    description: "REST surface for `Binding` mutation, single-id read, and target-side\r\nquery (P3.3, story rivoli-ai/andy-policies#21). Delegates to\r\nAndy.Policies.Application.Interfaces.IBindingService from P3.2 — same service powering MCP\r\n(P3.5), gRPC (P3.6), and CLI (P3.7). Service exceptions are mapped by\r\nthe global `PolicyExceptionHandler` (already covers\r\nAndy.Policies.Application.Exceptions.NotFoundException,\r\nAndy.Policies.Application.Exceptions.ConflictException, and\r\nAndy.Policies.Application.Exceptions.ValidationException; the\r\nAndy.Policies.Application.Exceptions.BindingRetiredVersionException\r\ninherits from Andy.Policies.Application.Exceptions.ConflictException so\r\nthe existing 409 mapping catches it)."
  - name: Help
    description: "Serves help content from markdown files in content/help/.\r\nConsumable by any client: Angular, Swift (Conductor), CLI, MCP."
  - name: Overrides
    description: Per-principal or per-cohort experimental policy overrides with approver + expiry. Writes (propose / approve / revoke) are gated by andy.policies.experimentalOverridesEnabled (default false); reads remain available regardless of the toggle so the resolution algorithm keeps working when the gate is off.
  - name: Policies
    description: "REST surface for the policy catalog (P1.5, story rivoli-ai/andy-policies#75).\r\nAll endpoints delegate to Andy.Policies.Application.Interfaces.IPolicyService; service exceptions are\r\nmapped to status codes by `PolicyExceptionHandler` (registered globally)."
  - name: PolicyVersionBindings
    description: "Version-rooted enumeration of `Binding`s (P3.3, story\r\nrivoli-ai/andy-policies#21). Sits next to the version resource so\r\nHATEOAS-style clients can discover bindings without a separate\r\nquery. Delegates to Andy.Policies.Application.Interfaces.IBindingService; the controller is\r\npurely a wire-format adapter."
  - name: PolicyVersionsLifecycle
    description: "REST surface for lifecycle transitions on a `PolicyVersion` (P2.3, story\r\nrivoli-ai/andy-policies#13). Three action-shaped endpoints — `publish`,\r\n`winding-down`, `retire` — sit on top of\r\nAndy.Policies.Application.Interfaces.ILifecycleTransitionService. Auto-supersede of the previous\r\nActive happens inside the service's serializable transaction; the controller\r\nis a thin wire-format adapter and never re-implements state-machine logic.\r\nService exceptions map to status codes via `PolicyExceptionHandler`:\r\nAndy.Policies.Application.Exceptions.ValidationException → 400 (rationale\r\nmissing), Andy.Policies.Application.Exceptions.NotFoundException → 404\r\n(unknown id), Andy.Policies.Application.Exceptions.InvalidLifecycleTransitionException\r\nand Andy.Policies.Application.Exceptions.ConcurrentPublishException → 409."
  - name: Scopes
    description: "REST surface for the scope hierarchy (P4.5, story\r\nrivoli-ai/andy-policies#33). Six endpoints sit on top of\r\nAndy.Policies.Application.Interfaces.IScopeService (P4.2) and\r\nAndy.Policies.Application.Interfaces.IBindingResolutionService (P4.3): list, get-by-id,\r\ntree, effective-policies, create, delete. Service exceptions are\r\nmapped to status codes by `PolicyExceptionHandler`:\r\n<list type=\"bullet\"><item>Andy.Policies.Application.Exceptions.NotFoundException → 404</item><item>Andy.Policies.Application.Exceptions.InvalidScopeTypeException → 400 (`scope.parent-type-mismatch`)</item><item>Andy.Policies.Application.Exceptions.ScopeRefConflictException → 409 (`scope.ref-conflict`)</item><item>Andy.Policies.Application.Exceptions.ScopeHasDescendantsException → 409 (`scope.has-descendants`)</item></list>"
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22'

jobs:
  build-backend:
    runs-on: ubuntu-latest

    services:
      # Integration tests for the legacy ItemsController scaffolding still hit
      # Postgres directly (rather than the SQLite-backed PoliciesApiFactory used
      # by the policy tests). Spin up a service container matching the
      # Host=localhost;Port=5439;Database=andy_policies;Username=andy_policies
      # connection string from appsettings.json.
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: andy_policies
          POSTGRES_USER: andy_policies
          POSTGRES_PASSWORD: andy_policies_dev_password
        ports:
          - 5439:5432
        options: >-
          --health-cmd "pg_isready -U andy_policies -d andy_policies"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: '**/coverage.cobertura.xml'

  rbac-docs-drift:
    # P7.7 (#65): docs/reference/permission-catalog.md is generated from
    # config/registration.json by tools/GenerateRbacDocs. Regenerating
    # must produce a byte-identical file; otherwise the PR changed the
    # manifest without regenerating the doc and the published catalog
    # has drifted from the source of truth.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Check permission catalog drift
        run: dotnet run --project tools/GenerateRbacDocs --configuration Release -- --check

  openapi-drift:
    # P1.9 (#79): the committed docs/openapi/andy-policies-v1.yaml is the
    # source of truth REST clients consume. Regenerating it from the live
    # Swashbuckle pipeline must produce a byte-identical file; otherwise the
    # PR forgot to run scripts/export-openapi.sh and the documented contract
    # has drifted from controller code.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Regenerate OpenAPI schema
        run: ./scripts/export-openapi.sh

      - name: Fail on drift
        run: |
          if ! git diff --exit-code docs/openapi/andy-policies-v1.yaml; then
            echo "::error::OpenAPI schema drift detected. Run ./scripts/export-openapi.sh and commit docs/openapi/andy-policies-v1.yaml."
            exit 1
          fi

      - name: Spectral lint
        uses: stoplightio/spectral-action@v0.8.2
        with:
          file_glob: docs/openapi/andy-policies-v1.yaml
          spectral_ruleset: .spectral.yaml

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # No frontend tests yet — client/src/ has no *.spec.ts files and the
      # default Karma entrypoint client/src/test.ts is missing. Reinstate this
      # step when we ship the first Angular component test.

      - name: Build
        run: npm run build -- --configuration production

  docker:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t andy-policies:${{ github.sha }} .
